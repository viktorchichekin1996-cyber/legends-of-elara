server {
    listen 80;
    server_name app.chichekin-tech.ru;
    
    root /var/www/app.chichekin-tech.ru;
    index index.html;
    
    # Раздача статики
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Кэширование статики
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Защита чувствительных файлов
    location ~ /\. {
        deny all;
    }
}