server {
    listen 80;
    server_name api.chichekin-tech.ru;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.chichekin-tech.ru;

    ssl_certificate /etc/letsencrypt/live/api.chichekin-tech.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.chichekin-tech.ru/privkey.pem;

    # Явная обработка OPTIONS для всех путей
    location / {
        # Обрабатываем preflight запросы
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://app.chichekin-tech.ru' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, X-Requested-With' always;
            add_header 'Access-Control-Max-Age' 86400;
            add_header 'Content-Type' 'text/plain charset=UTF-8';
            add_header 'Content-Length' 0;
            return 204;
        }

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Скрываем заголовки от бэкенда и добавляем свои
        proxy_hide_header Access-Control-Allow-Origin;
        add_header 'Access-Control-Allow-Origin' 'https://app.chichekin-tech.ru' always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
    }
}